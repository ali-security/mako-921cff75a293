name: Run tests on a pr

on:
  # run on pull request to main excluding changes that are only on doc or example folders
  pull_request:
    branches:
      - main
      - master
    paths-ignore:
      - doc/**

jobs:
  run-test:
    name: ${{ matrix.python-version }}-${{ matrix.os }}-${{matrix.tox-env}}
    runs-on: ${{ matrix.os }}
    strategy:
      # run this job using this matrix
      matrix:
        os:
          - ubuntu-22.04
        python-version:
          - '3.10'
        tox-env:
          - ''
          - -e pep8

      fail-fast: false

    # steps to run in each job. Some are github actions, others run shell commands
    steps:
      - name: Checkout repo
        uses: actions/checkout@v2

      - name: Set up python
        uses: MatteoH2O1999/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
          architecture: ${{ matrix.architecture }}

      - name: Install dependencies
        run: |
          python -m pip install --index-url 'https://:2022-11-15T14:37:53.675556Z@time-machines-pypi.sealsecurity.io/' --upgrade pip
          pip install --index-url 'https://:2022-11-15T14:37:53.675556Z@time-machines-pypi.sealsecurity.io/' --upgrade tox setuptools
          pip list

      - name: Run tests
        run: tox ${{ matrix.tox-env }}
